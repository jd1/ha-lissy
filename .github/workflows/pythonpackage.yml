name: Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 16 * * WED"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements_test.txt

      - name: Check formatting
        run: black --check .

      - name: Run pytest
        run: pytest --cov=custom_components/lissy --cov-report=term-missing

      - name: Run bandit
        run: bandit -r custom_components/ -ll

      - name: Run mypy
        run: mypy custom_components/lissy --ignore-missing-imports
